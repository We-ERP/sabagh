<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة إدارة الانتخابات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100">
    <div id="app-loader" class="fixed inset-0 bg-[#004aad] flex flex-col justify-center items-center text-white z-[9999]">
        <div class="animate-spin h-12 w-12 border-t-2 border-white rounded-full mb-4"></div>
        <h2>جاري التهيئة...</h2>
    </div>

    <!-- المحتوى -->
    <div id="mainContent" class="hidden">
        <!-- أزرار الأدمن التي طلبتها -->
        <div id="adminPanel" class="hidden p-4 bg-white shadow mb-4">
            <button onclick="switchTab('usersManagerTab')" class="text-red-600 font-bold ml-4">إدارة المستخدمين</button>
            <button onclick="switchTab('chartsTab')" class="text-orange-600 font-bold">تقارير بيانية</button>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzh9mF2bXi3Gtr8Th0vUPMmHo90Vk7Npbp22oj_k13smc5jfHJWlECbgjOhq0YthrGz8Q/exec";

    // دالة الفيتش المصححة (بدون no-cors)
    async function fetchAPI(action, payload = {}) {
        payload.action = action;
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await response.json();
        } catch (e) {
            console.error("Error:", e);
            return { error: "خطأ في الاتصال" };
        }
    }

    async function login() {
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const res = await fetchAPI('checkLogin', { username: u, password: p });
        
        if(res.success) {
            document.getElementById("app-loader").classList.add("hidden");
            document.getElementById("mainContent").classList.remove("hidden");
            // إذا كان أدمن
            if(res.role === "admin") {
                document.getElementById("adminPanel").classList.remove("hidden");
            }
        }
    }

    // إخفاء الـ Loader بمجرد تحميل الصفحة
    window.onload = () => document.getElementById('app-loader').style.display = 'none';
</script>
</body>
</html>
