<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة إدارة الانتخابات - لوحة التحكم</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { primary: '#004aad', secondary: '#ffccff', dark: '#1e293b' }
                }
            }
        }
    </script>

    <style>
        body {
            background: url('https://i.ibb.co/LzwwxDN8/img-1753488662296.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .btn-3d {
            position: relative; display: inline-block; font-weight: bold; text-transform: uppercase;
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.1s ease; transform: translateY(0);
        }
        .btn-3d-primary { background: linear-gradient(to bottom, #005ce6, #004aad); color: white; box-shadow: 0px 6px 0px #002b63, 0px 8px 15px rgba(0,0,0,0.3); }
        .btn-3d-primary:active { transform: translateY(4px); box-shadow: 0px 2px 0px #002b63, 0px 2px 5px rgba(0,0,0,0.3); }
        
        .btn-3d-green { background: linear-gradient(to bottom, #22c55e, #16a34a); color: white; box-shadow: 0px 6px 0px #14532d, 0px 8px 15px rgba(0,0,0,0.3); }
        .btn-3d-green:active { transform: translateY(4px); box-shadow: 0px 2px 0px #14532d, 0px 2px 5px rgba(0,0,0,0.3); }
        
        .btn-3d-purple { background: linear-gradient(to bottom, #a855f7, #9333ea); color: white; box-shadow: 0px 6px 0px #581c87, 0px 8px 15px rgba(0,0,0,0.3); }
        .btn-3d-purple:active { transform: translateY(4px); box-shadow: 0px 2px 0px #581c87, 0px 2px 5px rgba(0,0,0,0.3); }

        .table-container { max-height: 500px; overflow-y: auto; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        thead { position: sticky; top: 0; z-index: 10; background: #004aad; color: white; }
        th, td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        tbody tr { background: rgba(255,255,255,0.9); transition: background 0.2s; }
        tbody tr:hover { background: #f1f5f9; }
        
        .matrix-node { border-right: 4px solid #004aad; padding-right: 15px; margin-bottom: 10px; position: relative; }
        .matrix-node::before { content: ''; position: absolute; right: 0; top: 20px; width: 15px; height: 2px; background: #004aad; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #004aad; border-radius: 10px; }
        
        #app-loader {
            position: fixed; inset: 0; background: #004aad; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: opacity 0.5s;
        }
        .spinner {
            border: 5px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 5px solid white; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col">

    <div id="app-loader">
        <div class="spinner"></div>
        <h2 class="text-2xl font-bold">جاري تهيئة المنظومة...</h2>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-[2000]">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md mx-4 transform transition-all text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-primary text-white rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-lg">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800">تسجيل الدخول</h3>
            </div>
            
            <div class="space-y-4 text-right">
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700"><i class="fa-solid fa-user ml-2"></i>اسم المستخدم</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-lg bg-white/70 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary shadow-inner" placeholder="أدخل اسم المستخدم">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700"><i class="fa-solid fa-lock ml-2"></i>كلمة المرور</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-white/70 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary shadow-inner" placeholder="أدخل كلمة المرور">
                </div>
                
                <button onclick="login()" class="btn-3d btn-3d-primary w-full py-3 mt-4 text-lg">
                    <i class="fa-solid fa-sign-in-alt ml-2"></i> دخول
                </button>
            </div>
        </div>
    </div>

    <header class="bg-primary/95 backdrop-blur-md text-white shadow-md relative z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-flag text-2xl text-secondary"></i>
                <h1 class="text-xl font-bold tracking-wide">أمانة تنظيم القاهرة - منظومة اللجان</h1>
            </div>
            <div id="userProfile" class="hidden flex items-center gap-4">
                <span class="font-medium bg-black/20 px-4 py-1.5 rounded-full backdrop-blur-sm border border-white/10" id="displayUsername">
                    <i class="fa-solid fa-circle-user ml-2"></i> <span id="uNameTxt"></span>
                </span>
                <button onclick="logout()" class="hover:text-red-300 transition-colors bg-white/10 p-2 rounded-full h-10 w-10 flex items-center justify-center">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-64 glass-panel border-l shadow-2xl flex flex-col hidden z-40 relative">
            <div class="p-6 border-b border-gray-200/50 text-center">
                <h2 class="text-xl font-bold text-primary" id="sidebarSectionName">قسم...</h2>
            </div>
            
            <nav class="flex-1 p-4 space-y-3 mt-2 overflow-y-auto">
                <button onclick="switchTab('entryTab')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-xl shadow-md transition-all font-bold">
                    <i class="fa-solid fa-pen-to-square w-6 text-center"></i> إدخال البيانات
                </button>
                <button onclick="switchTab('mirrorsTab')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-white/60 rounded-xl transition-all font-bold">
                    <i class="fa-solid fa-database w-6 text-center text-purple-600"></i> مراجعة الشيتات
                </button>
                <button onclick="switchTab('totalsTab')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-white/60 rounded-xl transition-all font-bold">
                    <i class="fa-solid fa-chart-pie w-6 text-center text-green-600"></i> الإجمالي النهائي
                </button>
            </nav>
        </aside>

        <main id="mainContent" class="flex-1 overflow-y-auto p-6 relative hidden">
            <div id="entryTab" class="tab-content w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
                <div class="glass-panel p-8 rounded-2xl flex-1 border-t-4 border-t-primary shadow-xl">
                    <h2 class="text-2xl font-extrabold mb-6 text-gray-800 border-b pb-3"><i class="fa-solid fa-keyboard ml-2 text-primary"></i> تسجيل البيانات</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="font-bold text-gray-700 text-sm">القسم</label>
                            <select id="sectionSelect" onchange="loadCenters()" class="w-full p-3 rounded-lg bg-gray-50 border border-gray-300 focus:ring-2 focus:ring-primary font-medium">
                                <option value="">--- اختر ---</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="font-bold text-gray-700 text-sm">المركز الانتخابي</label>
                            <select id="centerSelect" onchange="loadCommittees()" class="w-full p-3 rounded-lg bg-gray-50 border border-gray-300 focus:ring-2 focus:ring-primary font-medium">
                                <option value="">--- اختر ---</option>
                            </select>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="font-bold text-gray-700 text-sm">رقم اللجنة</label>
                            <select id="committeeSelect" onchange="showDelegates()" class="w-full p-3 rounded-lg bg-gray-50 border border-gray-300 focus:ring-2 focus:ring-primary font-medium">
                                <option value="">--- اختر ---</option>
                            </select>
                        </div>
                    </div>
                    <div id="delegateWrapper" class="mt-6 hidden">
                        <div class="overflow-hidden rounded-xl border border-gray-200 shadow-sm">
                            <table class="w-full text-sm text-center bg-white" dir="ltr">
                                <thead class="bg-gray-100 text-gray-700">
                                    <tr>
                                        <th class="py-3 px-4 font-bold border-b text-left">Phone (Alt)</th>
                                        <th class="py-3 px-4 font-bold border-b text-right">Delegate (Alt)</th>
                                        <th class="py-3 px-4 font-bold border-b text-left">Phone (Main)</th>
                                        <th class="py-3 px-4 font-bold border-b text-right">Delegate (Main)</th>
                                    </tr>
                                </thead>
                                <tbody id="delegateBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="mt-8 bg-blue-50/50 p-6 rounded-xl border border-blue-100">
                        <div class="flex flex-col sm:flex-row items-end gap-4">
                            <div class="flex-1 w-full space-y-2">
                                <label class="font-bold text-gray-800">رقم التسجيل</label>
                                <input type="number" id="numberInput" class="w-full p-4 text-xl font-bold rounded-lg bg-white border border-blue-300 focus:ring-2 focus:ring-primary shadow-inner text-center" placeholder="أدخل الرقم هنا...">
                            </div>
                            <button onclick="addData()" class="btn-3d btn-3d-primary py-4 px-8 text-lg w-full sm:w-auto h-full">
                                <i class="fa-solid fa-plus-circle ml-2"></i> إضافة البيانات
                            </button>
                        </div>
                        <div id="noBoxMsg" class="mt-3 text-red-600 font-bold bg-red-100 p-3 rounded-lg border border-red-200 hidden text-center">
                            <i class="fa-solid fa-triangle-exclamation ml-2"></i> لم يتم فتح الصندوق لهذه اللجنة بعد!
                        </div>
                    </div>
                </div>
                <div class="glass-panel w-full lg:w-1/3 rounded-2xl flex flex-col border-t-4 border-t-purple-600 shadow-xl overflow-hidden h-[600px]">
                    <div class="p-4 bg-purple-50/80 border-b flex justify-between items-center">
                        <h3 class="font-bold text-purple-900 text-lg"><i class="fa-solid fa-box-open ml-2"></i> حالة الصناديق</h3>
                        <button onclick="refreshPanel()" class="text-purple-600 hover:text-purple-800 bg-white p-2 rounded-lg shadow-sm border border-purple-200">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                    </div>
                    <div id="committeeList" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white/50"></div>
                </div>
            </div>

            <div id="mirrorsTab" class="tab-content hidden w-full mx-auto max-w-7xl">
                <h2 class="text-3xl font-extrabold mb-8 text-gray-800 text-center">مراجعة قواعد البيانات</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <button onclick="openSheetModal('Data')" class="glass-card p-6 text-center"><h3>شيت Data</h3></button>
                    <button onclick="openSheetModal('Election_July')" class="glass-card p-6 text-center"><h3>Election_July</h3></button>
                    <button onclick="openSheetModal('Codes')" class="glass-card p-6 text-center"><h3>شيت Codes</h3></button>
                    <button onclick="openSheetModal('الاجمالي')" class="glass-card p-6 text-center"><h3>شيت الإجمالي</h3></button>
                </div>
                <div id="sheetViewer" class="glass-panel p-6 rounded-2xl hidden shadow-2xl">
                    <div class="flex justify-between items-center mb-6 pb-4 border-b">
                        <h3 class="text-2xl font-bold" id="viewerTitle"></h3>
                        <button onclick="downloadExcel()" class="btn-3d btn-3d-green px-6 py-2">تحميل Excel</button>
                    </div>
                    <div class="table-container bg-white" id="tableWrapper" dir="ltr">
                        <table id="dataTableMirror" class="min-w-full text-left"></table>
                    </div>
                </div>
            </div>

            <div id="totalsTab" class="tab-content hidden w-full mx-auto max-w-7xl">
                <h2 class="text-3xl font-extrabold mb-8 text-gray-800 text-center">الإجمالي النهائي</h2>
                <div class="glass-panel p-8 rounded-2xl shadow-xl min-h-[500px]">
                    <div class="flex justify-between items-center border-b pb-4 mb-6">
                        <button onclick="loadFinalMatrix()" class="btn-3d btn-3d-primary px-4 py-2">تحديث الأرقام</button>
                    </div>
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="w-full md:w-1/3 flex flex-col gap-4" id="centersMatrixList"></div>
                        <div class="w-full md:w-2/3 glass-card p-6 bg-gray-50/50 hidden" id="committeesMatrixView">
                            <h4 class="text-2xl font-black" id="matrixCenterTitle"></h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="matrixCommitteesGrid" dir="ltr"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzh9mF2bXi3Gtr8Th0vUPMmHo90Vk7Npbp22oj_k13smc5jfHJWlECbgjOhq0YthrGz8Q/exec";

async function fetchAPI(action, payload = {}) {
    payload.action = action;
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            mode: "cors",
            body: JSON.stringify(payload),
            headers: { "Content-Type": "application/json" }
        });
        const text = await response.text();
        return JSON.parse(text);
    } catch (error) {
        console.error("API Error:", error);
        throw error;
    }
}
