<!-- أضف هذا السطر في الـ HEAD لاستدعاء مكتبة الرسوم البيانية -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- أضف التبويبات الجديدة في الـ Sidebar -->
<button onclick="switchTab('adminTab')" id="adminTabBtn" class="nav-btn hidden w-full flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-white/60 rounded-xl transition-all font-bold">
    <i class="fa-solid fa-users-gear w-6 text-center text-red-600"></i> المستخدمين
</button>
<button onclick="switchTab('chartsTab')" id="chartsTabBtn" class="nav-btn hidden w-full flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-white/60 rounded-xl transition-all font-bold">
    <i class="fa-solid fa-chart-column w-6 text-center text-orange-600"></i> تقارير بيانية
</button>

<!-- محتوى الـ Admin في الـ Main Content -->
<div id="adminTab" class="tab-content hidden w-full max-w-4xl mx-auto glass-panel p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6">إدارة المستخدمين</h2>
    <div id="usersTable" class="overflow-x-auto"></div>
</div>

<div id="chartsTab" class="tab-content hidden w-full max-w-4xl mx-auto glass-panel p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6">الإحصائيات العامة</h2>
    <canvas id="myChart"></canvas>
</div>

<script>
let currentUserRole = "";

async function login() {
    // ... داخل دالة الـ Login بعد التحقق:
    if(result.success) {
        currentUserRole = result.role;
        if(currentUserRole === 'admin') {
            document.getElementById('adminTabBtn').classList.remove('hidden');
            document.getElementById('chartsTabBtn').classList.remove('hidden');
            document.getElementById('sidebarSectionName').innerText = "Admin Panel";
        }
    }
}

// دالة عرض المستخدمين (للأدمن)
async function loadUsers() {
    const users = await fetchAPI('getUsers');
    let html = `<table class="w-full text-right border-collapse"><thead><tr class="bg-primary text-white"><th>القسم</th><th>المستخدم</th><th>كلمة السر</th><th>حفظ</th></tr></thead><tbody>`;
    users.forEach((u, i) => {
        html += `<tr>
            <td><input id="u_sec_${i}" value="${u.section}"></td>
            <td><input id="u_user_${i}" value="${u.user}"></td>
            <td><input id="u_pass_${i}" value="${u.pass}"></td>
            <td><button onclick="saveUser(${u.index}, ${i})" class="bg-green-500 text-white px-2 py-1 rounded">حفظ</button></td>
        </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('usersTable').innerHTML = html;
}

// دالة عرض الرسوم البيانية
async function loadCharts() {
    const stats = await fetchAPI('getDashboardStats');
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(stats),
            datasets: [{ label: 'إجمالي الأرقام', data: Object.values(stats), backgroundColor: '#004aad' }]
        }
    });
}
</script>
